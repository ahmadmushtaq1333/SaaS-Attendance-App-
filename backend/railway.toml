[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh -c \"python manage.py migrate --noinput && gunicorn --bind 0.0.0.0:${PORT:-8000} --workers 1 --timeout 120 --log-level debug attendance_saas.wsgi:application\""
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3